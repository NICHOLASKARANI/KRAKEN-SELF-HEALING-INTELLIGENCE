<!DOCTYPE html>
<html>
<head>
    <title>KRAKEN Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .health-status {
            font-size: 48px;
            text-align: center;
            margin: 20px 0;
        }
        .status-green { color: #4caf50; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .metric {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #ff9800;
        }
        button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        .live-badge {
            background: #f44336;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦑 KRAKEN <span class="live-badge">LIVE</span></h1>
            <p>Self-Healing Intelligence Core</p>
        </div>
        
        <div class="card">
            <h2>System Health</h2>
            <div class="health-status status-green" id="healthStatus">🟢 OPERATIONAL</div>
            <div id="healthDetails">All systems running normally</div>
        </div>
        
        <div class="card">
            <h2>Key Metrics</h2>
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value" id="uptime">99.99%</div>
                    <div>Uptime</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="decisions">0</div>
                    <div>AI Decisions Today</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="savings">$0</div>
                    <div>Money Saved</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>AI Control</h2>
            <button onclick="triggerAI()">Trigger AI Decision</button>
            <div id="aiResponse" style="margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px;"></div>
        </div>
        
        <div class="card">
            <h2>Recent Activity</h2>
            <div id="activityLog">
                <p>🦑 KRAKEN initialized and monitoring...</p>
            </div>
        </div>
    </div>
    
    <script>
        async function fetchHealth() {
            try {
                const response = await fetch('http://localhost:8000/system-health');
                const data = await response.json();
                document.getElementById('healthStatus').innerHTML = '🟢 OPERATIONAL';
                document.getElementById('healthDetails').innerHTML = 'All services running';
            } catch (error) {
                document.getElementById('healthStatus').innerHTML = '🟡 CONNECTING...';
            }
        }
        
        async function triggerAI() {
            try {
                const response = await fetch('http://localhost:8000/ai-decision', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await response.json();
                document.getElementById('aiResponse').innerHTML = `
                    <strong>Decision:</strong> ${data.decision}<br>
                    <strong>Confidence:</strong> ${(data.confidence * 100).toFixed(0)}%<br>
                    <strong>Time:</strong> ${new Date(data.timestamp).toLocaleTimeString()}
                `;
                
                // Update activity log
                const log = document.getElementById('activityLog');
                const entry = document.createElement('p');
                entry.innerHTML = `🤖 AI Decision: ${data.decision} (${new Date().toLocaleTimeString()})`;
                log.insertBefore(entry, log.firstChild);
                
                // Update counter
                let count = parseInt(document.getElementById('decisions').innerText);
                document.getElementById('decisions').innerText = count + 1;
                document.getElementById('savings').innerText = '$' + ((count + 1) * 250).toFixed(0);
            } catch (error) {
                document.getElementById('aiResponse').innerHTML = 'Error connecting to AI Brain. Make sure Docker is running.';
            }
        }
        
        fetchHealth();
        setInterval(fetchHealth, 30000);
    </script>
</body>
</html>
